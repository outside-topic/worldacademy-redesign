<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Search — SHRM Recertification</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        

    </style>
</head>

<body>

    <section class="search-section" aria-label="Course Search">

        <div class="container">
            <div class="row justify-content-center">
                <div class=" col-12 col-md-6 col-lg-6 col-xl-6">


                    <!-- Search Form -->
                    <div class="search-container">
                        <form class="search-box" role="search" aria-label="Search courses" autocomplete="off">

                            <!-- Search Icon -->
                            <div class="search-icon-wrapper" aria-hidden="true">
                                <i class="bi bi-search"></i>
                            </div>

                            <!-- Input -->
                            <div class="search-input-wrapper">
                                <label for="courseSearch" class="visually-hidden">Search by Program Name, Code or
                                    Keyword</label>
                                <input type="text" id="courseSearch" class="search-input"
                                    placeholder="Search by Program Name, Code or Keyword..."
                                    aria-label="Search by Program Name, Code or Keyword" aria-autocomplete="list"
                                    aria-controls="searchDropdown" aria-expanded="false">
                            </div>

                            <!-- Action Buttons -->
                            <div class="search-actions">
                                <!-- Clear -->
                                <button type="button" class="search-action-btn search-clear-btn" id="clearSearch"
                                    aria-label="Clear search" data-tooltip="Clear">
                                    <i class="bi bi-x-lg"></i>
                                </button>

                                <div class="search-divider" aria-hidden="true"></div>

                                <!-- Submit -->
                                <button type="submit" class="search-submit-btn" aria-label="Search">
                                    <i class="bi bi-arrow-right"></i>
                                    <span class="wt">Search</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
    </section>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const searchBox = document.querySelector('.search-box');
            const searchInput = document.getElementById('courseSearch');
            const clearBtn = document.getElementById('clearSearch');
            const dropdown = document.getElementById('searchDropdown');
            const dropdownItems = dropdown.querySelectorAll('.dropdown-item');
            const helperTags = document.querySelectorAll('.search-helper-tag');
            let activeIndex = 0;

            /* ---- Focus / Blur handling ---- */
            searchInput.addEventListener('focus', function () {
                searchBox.classList.add('focused');
                if (searchInput.value.trim().length > 0) {
                    showDropdown();
                }
            });

            searchInput.addEventListener('blur', function () {
                /* Delay to allow click on dropdown items */
                setTimeout(function () {
                    searchBox.classList.remove('focused');
                    hideDropdown();
                }, 200);
            });

            /* ---- Input handling ---- */
            searchInput.addEventListener('input', function () {
                const val = searchInput.value.trim();
                if (val.length > 0) {
                    clearBtn.classList.add('visible');
                    showDropdown();
                } else {
                    clearBtn.classList.remove('visible');
                    hideDropdown();
                }
            });

            /* ---- Clear button ---- */
            clearBtn.addEventListener('click', function (e) {
                e.preventDefault();
                searchInput.value = '';
                clearBtn.classList.remove('visible');
                hideDropdown();
                searchInput.focus();
            });

            /* ---- Dropdown navigation with keyboard ---- */
            searchInput.addEventListener('keydown', function (e) {
                const items = Array.from(dropdownItems);
                if (!dropdown.classList.contains('visible')) return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeIndex = Math.min(activeIndex + 1, items.length - 1);
                    updateActiveItem(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeIndex = Math.max(activeIndex - 1, 0);
                    updateActiveItem(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (items[activeIndex]) {
                        selectItem(items[activeIndex]);
                    }
                } else if (e.key === 'Escape') {
                    hideDropdown();
                    searchInput.blur();
                }
            });

            /* ---- Click on dropdown items ---- */
            dropdownItems.forEach(function (item) {
                item.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    selectItem(item);
                });
            });

            /* ---- Helper tags fill input ---- */
            helperTags.forEach(function (tag) {
                tag.addEventListener('click', function () {
                    searchInput.value = tag.textContent.trim();
                    clearBtn.classList.add('visible');
                    searchInput.focus();
                    showDropdown();
                });
            });

            /* ---- Prevent form submit for demo ---- */
            searchBox.addEventListener('submit', function (e) {
                e.preventDefault();
                if (searchInput.value.trim().length > 0) {
                    /* In production, this would submit the search */
                    searchInput.blur();
                }
            });

            /* ---- Helper functions ---- */
            function showDropdown() {
                dropdown.classList.add('visible');
                searchInput.setAttribute('aria-expanded', 'true');
                activeIndex = 0;
                updateActiveItem(Array.from(dropdownItems));
            }

            function hideDropdown() {
                dropdown.classList.remove('visible');
                searchInput.setAttribute('aria-expanded', 'false');
            }

            function updateActiveItem(items) {
                items.forEach(function (item, i) {
                    if (i === activeIndex) {
                        item.classList.add('active');
                        item.setAttribute('aria-selected', 'true');
                    } else {
                        item.classList.remove('active');
                        item.setAttribute('aria-selected', 'false');
                    }
                });
            }

            function selectItem(item) {
                const title = item.querySelector('.dropdown-item-title');
                if (title) {
                    /* Strip <mark> tags for clean value */
                    searchInput.value = title.textContent.trim();
                    clearBtn.classList.add('visible');
                }
                hideDropdown();
                searchInput.focus();
            }
        });
    </script>

</body>

</html>
