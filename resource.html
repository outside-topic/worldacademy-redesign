<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <section class="res_sec text-center">
        <div class="container">
            <div class="row g-4 d-flex">
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <div class="res_card">
                        <img src="images/product_img.jpg" class="img-fluid mb-5" style="height: 286px;" alt="">
                        <h2 class="mb-4">Performance Management Tool</h2>
                        <a href="#" class="btn-brochure" data-bs-toggle="modal" data-bs-target="#myModal"><i class="bi bi-download"></i> Download Doc</a>
                    </div>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <div class="res_card">
                        <img src="images/product_img.jpg" class="img-fluid mb-5" style="height: 286px;" alt="">
                        <h2 class="mb-4">Job Analysis Form</h2>
                        <a href="#" class="btn-brochure" data-bs-toggle="modal" data-bs-target="#myModal"><i
                                class="bi bi-download"></i> Download Docx</a>
                    </div>
                </div>
                <div class="col-12 col-sm-12 col-md-4 col-lg-4">
                    <div class="res_card">
                        <img src="images/product_img.jpg" class="img-fluid mb-5" style="height: 286px;" alt="">
                        <h2 class="mb-4">Job Analysis checklist</h2>
                        <a href="#" class="btn-brochure" data-bs-toggle="modal" data-bs-target="#myModal"><i
                                class="bi bi-download"></i> Download Docx</a>
                    </div>
                </div>
                <div class="modal fade" id="myModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">

                            <div class="modal-header">
                                <h5 class="modal-title">Contact Information</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <div class="modal-body">
                                <form class="text-start">

                                    <!-- Name -->
                                    <div class="mb-3">
                                        <label class="form-label">
                                            Name <span class="text-danger">*</span>
                                        </label>
                                        <input type="text" class="form-control" placeholder="Type Your Name">
                                    </div>

                                    <!-- Email -->
                                    <div class="mb-3">
                                        <label class="form-label">
                                            Email <span class="text-danger">*</span>
                                        </label>
                                        <input type="email" class="form-control" placeholder="Type Your Email">
                                    </div>

                                    <!-- Country -->
                                    <div class="mb-3">
                                        <label class="form-label">
                                            Country <span class="text-danger">*</span>
                                        </label>

                                        <select class="form-select">
                                            <option selected disabled>Select Country</option>
                                            <option>Bangladesh</option>
                                            <option>India</option>
                                            <option>Pakistan</option>
                                            <option>United Kingdom</option>
                                            <option>United States</option>
                                        </select>
                                    </div>

                                    <!-- Whatsapp -->
                                    <div class="mb-3">
                                        <label class="form-label">
                                            Whatsapp Number <span class="text-danger">*</span>
                                        </label>
                                        <input type="tel" class="form-control"
                                            placeholder="Write country code and your number">
                                    </div>

                                    <!-- Organization -->
                                    <div class="mb-3">
                                        <label class="form-label">
                                            Organization
                                        </label>
                                        <input type="text" class="form-control" placeholder="Write Organization">
                                    </div>

                                    <!-- Designation -->
                                    <div class="mb-3">
                                        <label class="form-label">
                                            Designation
                                        </label>
                                        <input type="text" class="form-control" placeholder="Write Designation">
                                    </div>

                                    <!-- Checkbox -->
                                    <div class="form-check mb-4">
                                        <input class="form-check-input" type="checkbox" id="subscribe">

                                        <label class="form-check-label small" for="subscribe">
                                            Click on submit button will indicate that you want to subscribe with us and
                                            wish to receive future offers.
                                        </label>
                                    </div>
                                    <div class="text-end">
                                        <button class="btn btn-primary rounded-pill px-4">
                                            Submit
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
