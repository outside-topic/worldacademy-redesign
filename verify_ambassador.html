<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Ambassador</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- ============================================
         Certificate Hero Section
         ============================================ -->
    <section>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">

                    <div class="hero-content">

                        <!-- Breadcrumb Navigation -->
                        <nav aria-label="Breadcrumb">
                            <ol class="hero-breadcrumb">
                                <li>
                                    <a href="#">Home</a>
                                </li>
                                <li>
                                    <span class="hero-breadcrumb-sep" aria-hidden="true">/</span>
                                </li>
                                <li>
                                    <span class="hero-breadcrumb-current" aria-current="page">Verify Ambassador</span>
                                </li>
                            </ol>
                        </nav>

                        <!-- Thin gold separator line -->
                        <div class="hero-separator" aria-hidden="true"></div>

                        <!-- Page Title -->
                        <h1 class="hero-title">
                            Verify
                            <span class="hero-title-accent">Ambassador</span>
                        </h1>
                    </div>
                </div>
            </div>
        </div>
    </section>




    <!-- ============================================
         Premium Search Section
         ============================================ -->
    <section class="search-section" aria-label="Course search">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-12 col-lg-12">
                    <!-- Title -->
                    <h2 class="search-title">Verify Ambassador Status</h2>

                    <!-- Subtitle with gold accent -->
                    <p class="search-subtitle">
                        Search by Ambassador ID, Name, Email, or Phone Number
                    </p>
                    <!-- Glass Card -->
                    <div class="search-card">
                        <!-- Search Form -->
                        <form role="search" aria-label="Search courses" onsubmit="return false;">
                            <div class="search-wrapper">
                                <!-- Input Container -->
                                <div class="input-container">
                                    <!-- Left Search Icon -->
                                    <span class="input-search-icon" aria-hidden="true">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <circle cx="11" cy="11" r="8" />
                                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                        </svg>
                                    </span>
                                    <!-- Accessible Label (visually hidden) -->
                                    <label for="searchInput" class="visually-hidden">
                                        Verify Partner
                                    </label>
                                    <!-- Input Field -->
                                    <input type="text" id="searchInput" class="search-input"
                                        placeholder="Please Enter verification Number Or Name" autocomplete="off"
                                        aria-label="Search Courses">

                                    <!-- Clear Button (X) — appears when typing -->
                                    <button type="button" id="clearBtn" class="clear-btn" aria-label="Clear search text"
                                        tabindex="0">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <line x1="18" y1="6" x2="6" y2="18" />
                                            <line x1="6" y1="6" x2="18" y2="18" />
                                        </svg>
                                    </button>

                                </div>

                                <!-- Search Button -->
                                <button type="submit" class="search-btn" aria-label="Submit search">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                                        aria-hidden="true">
                                        <circle cx="11" cy="11" r="8" />
                                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                    </svg>
                                    <span>Search</span>
                                </button>

                            </div>
                        </form>

                    </div>
                    <!-- /Glass Card -->

                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>

</html>
