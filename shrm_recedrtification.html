<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <!-- Custom Styles -->
</head>

<body>

    <main class="course-listing-page">
        <h1 class="hero-title text-center">
            Shrm <span class="hero-title-accent"> Recertification
            </span>Pdc
        </h1>
        <div class="search-section text-center">
            <h2>PDCs for SHRM recertification are available!</h2>
            <p class="shp mt-3">Join any of our courses listed below to get PDCs to recertify your SHRM-CP or SHRM-SCP certification</p>
        </div>
        <div class="container">
            <!-- Filter Card -->
            <section class="filter-card" aria-label="Course filter">
                <div class="d-flex align-items-center gap-2 filter-label-wrap">
                    <i class="bi bi-funnel filter-icon"></i>
                    <span class="filter-label">Course Type</span>
                </div>

                <div class="select-wrapper">
                    <select id="courseFilter" class="form-select custom-select" aria-label="Filter by course type">
                        <option value="all">All Courses</option>
                        <option value="certified" selected>Certified Professional</option>
                        <option value="diploma">Diploma/ Post Graduate Diploma</option>
                        <option value="Professional">Professional Certificate/ Certificate/ Post Graduate Certificate
                        </option>
                        <option value="Workshop">Workshop</option>
                    </select>
                    <i class="bi bi-chevron-down select-arrow" aria-hidden="true"></i>
                </div>

                <p class="course-count">
                    Showing <span id="courseCount" class="count-number">20</span> courses
                </p>
            </section>

            <!-- Table Card -->
            <section class="table-card" aria-label="Course list">
                <div class="table-responsive">
                    <table class="course-table" id="courseTable">
                        <thead>
                            <tr>
                                <th class="col-sl">SL NO</th>
                                <th class="col-title">COURSE TITLE</th>
                                <th class="col-shrm">SHRM</th>
                            </tr>
                        </thead>
                        <tbody id="courseTableBody">
                            <!-- Rows populated by JavaScript -->
                        </tbody>
                    </table>

                    <!-- Empty state -->
                    <div id="emptyState" class="empty-state is-hidden">
                        <i class="bi bi-inbox empty-icon"></i>
                        <p class="empty-text">No courses found</p>
                    </div>
                </div>
            </section>

        </div>
    </main>
    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Script -->
    <script>

            { title: "Post Graduate Diploma in Human Resource Management", shrm: 40, category: "diploma" },

            { title: "HR Audit: Preparation & Conduction", shrm: 3, category: "Workshop" },

            { title: "Job Analysis: Methods & Tools", shrm: 3, category: "Workshop" },
            { title: "Business Intelligence for Managers", shrm: 3, category: "Workshop" },

            { title: "Learning & Development as Business Partner", shrm: 3, category: "Workshop" },
            { title: "Employee Separation & Final Settlement: Process & Calculation", shrm: 3, category: "Workshop" },
            { title: "Emotional Intelligence at Work: KEY to Success", shrm: 4, category: "Workshop" },
        ];

        /* ============================================
           DOM REFERENCES
           ============================================ */
        const filterSelect = document.getElementById('courseFilter');
        const tableBody = document.getElementById('courseTableBody');
        const courseCountEl = document.getElementById('courseCount');
        const emptyState = document.getElementById('emptyState');
        const courseTable = document.getElementById('courseTable');

        /* ============================================
           RENDER TABLE ROWS
           ============================================ */
        function renderCourses(filterValue) {
            const filtered = filterValue === 'all'
                ? courses
                : courses.filter(c => c.category === filterValue);

            tableBody.innerHTML = '';
            courseCountEl.textContent = filtered.length;

            if (filtered.length === 0) {
                courseTable.classList.add('is-hidden');
                emptyState.classList.remove('is-hidden');
                return;
            }

            courseTable.classList.remove('is-hidden');
            emptyState.classList.add('is-hidden');

            filtered.forEach((course, index) => {
                const tr = document.createElement('tr');
                tr.classList.add('row-animate');
                tr.style.animationDelay = `${index * 30}ms`;

                tr.innerHTML = `
            <td class="col-sl">${index + 1}</td>
            <td class="col-title">${course.title}</td>
            <td class="col-shrm">${course.shrm}</td>
        `;

                tableBody.appendChild(tr);
            });
        }

        /* ============================================
           EVENT LISTENER
           ============================================ */
        filterSelect.addEventListener('change', function () {
            renderCourses(this.value);
        });

        /* ============================================
           INITIAL RENDER
           ============================================ */
        renderCourses(filterSelect.value);
    </script>
</body>

</html>
