<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Listing</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        /* ============================================
   ROOT VARIABLES — DO NOT MODIFY
   ============================================ */
        :root {
            --gold: #716027;
            --gold-light: #9a8534;
            --gold-lighter: #b8a04a;
            --gold-pale: #d4c06e;
            --gold-faint: #f5ecd4;
            --gold-ultra-faint: #faf6ec;
            --gold-dark: #5a4d1f;
            --gold-darker: #3d3414;

            --white: #ffffff;

            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 24px;

            --shadow-soft: 0 4px 24px rgba(113, 96, 39, 0.08);
            --shadow-medium: 0 8px 40px rgba(113, 96, 39, 0.12);
            --shadow-hover: 0 16px 56px rgba(113, 96, 39, 0.18);

            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);

            --font-heading: "Poppins", sans-serif;
            --font-body: "Poppins", sans-serif;

            --clr-primary-light: #8a7535;
            --clr-primary-dark: #5a4d1f;
            --clr-primary-bg: rgba(113, 96, 39, 0.08);
            --clr-primary-bg-hover: rgba(113, 96, 39, 0.14);

            --clr-beige: #F8F6F0;
            --clr-beige-dark: #EFECE3;
            --clr-white: #FFFFFF;

            --clr-text: #2D2A24;
            --clr-text-muted: #7A7568;

            --clr-border: #E8E4DA;
            --clr-border-light: #F0EDE5;

            --clr-shadow: rgba(113, 96, 39, 0.06);
            --clr-shadow-md: rgba(113, 96, 39, 0.10);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            --transition-fast: 200ms ease;
            --transition-base: 300ms ease;
            --transition-slow: 400ms ease;

            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #a3a3a3;

            --border-gold: rgba(113, 96, 39, 0.15);
            --border-gold-hover: rgba(113, 96, 39, 0.25);

            --shadow-card:
                0 4px 32px rgba(113, 96, 39, 0.07),
                0 1px 4px rgba(0, 0, 0, .03);

            --shadow-card-hover:
                0 12px 48px rgba(113, 96, 39, 0.12),
                0 2px 8px rgba(0, 0, 0, .04);

            --shadow-input-focus:
                0 0 0 4px rgba(113, 96, 39, .08);

            --shadow-btn-hover:
                0 8px 28px rgba(113, 96, 39, .32);

            --shadow-btn-active:
                0 2px 12px rgba(113, 96, 39, .20);

            --radius-pill: 9999px;
            --radius-card: 24px;

            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ============================================
   UTILITY
   ============================================ */
        .is-hidden {
            display: none !important;
        }

        /* ============================================
   BASE OVERRIDES
   ============================================ */
        body {
            font-family: var(--font-body);
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--gold-ultra-faint);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================
   PAGE LAYOUT
   ============================================ */
        .course-listing-page {
            padding: 40px 0 60px;
        }

        .course-listing-page .container {
            max-width: 960px;
        }

        /* ============================================
   FILTER CARD
   ============================================ */
        .filter-card {
            background: var(--white);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 28px 32px 24px;
            margin-bottom: 20px;
        }

        .filter-label-wrap {
            margin-bottom: 14px;
        }

        .filter-icon {
            font-size: 15px;
            color: var(--gold);
            line-height: 1;
        }

        .filter-label {
            font-family: var(--font-heading);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        /* ============================================
   CUSTOM SELECT — Premium Dropdown
   ============================================ */
        .select-wrapper {
            position: relative;
        }

        .custom-select.form-select {
            height: 64px;
            padding: 0 48px 0 20px;
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1;
            background-color: var(--white);
            background-image: none;
            border: 1.5px solid var(--border-gold);
            outline: 1.5px solid var(--border-gold);
            outline-offset: 3px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .custom-select.form-select:focus {
            border-color: var(--border-gold-hover);
            outline-color: var(--border-gold-hover);
            box-shadow: var(--shadow-input-focus);
        }

        .custom-select.form-select:hover {
            border-color: var(--border-gold-hover);
            outline-color: var(--border-gold-hover);
        }

        .custom-select.form-select option {
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 400;
            color: var(--text-primary);
            padding: 8px;
        }

        .select-arrow {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--gold);
            pointer-events: none;
            transition: var(--transition-fast);
        }

        .select-wrapper:hover .select-arrow {
            color: var(--gold-light);
        }

        /* ============================================
   COURSE COUNT
   ============================================ */
        .course-count {
            margin: 14px 0 0;
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1;
        }

        .count-number {
            color: var(--gold);
            font-weight: 600;
        }

        /* ============================================
   TABLE CARD
   ============================================ */
        .table-card {
            background: var(--white);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        /* Custom scrollbar for Bootstrap table-responsive */
        .table-responsive::-webkit-scrollbar {
            height: 6px;
        }

        .table-responsive::-webkit-scrollbar-track {
            background: var(--clr-beige);
            border-radius: 3px;
        }

        .table-responsive::-webkit-scrollbar-thumb {
            background: var(--gold-pale);
            border-radius: 3px;
        }

        /* ============================================
   TABLE STYLES
   ============================================ */
        .course-table {
            width: 100%;
            table-layout: fixed;
        }

        .col-sl {
            width: 80px;
        }

        .col-hrci-type {
            width: 140px;
        }

        .col-hrci {
            width: 90px;
        }

        /* ---- Header ---- */
        .course-table thead tr {
            background-color: var(--clr-beige);
        }

        .course-table thead th {
            padding: 16px 20px;
            font-family: var(--font-heading);
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            border-bottom: 1.5px solid var(--clr-border);
            vertical-align: middle;
        }

        .course-table thead th.col-sl,
        .course-table thead th.col-hrci-type,
        .course-table thead th.col-hrci {
            text-align: center;
        }

        .course-table thead th.col-title {
            text-align: left;
        }

        /* ---- Body Rows ---- */
        .course-table tbody tr {
            transition: background-color var(--transition-base), transform var(--transition-fast);
        }

        .course-table tbody tr:not(:last-child) td {
            border-bottom: 1px solid var(--clr-border-light);
        }

        .course-table tbody tr:hover {
            background-color: var(--clr-primary-bg);
        }

        .course-table tbody td {
            padding: 15px 20px;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            vertical-align: middle;
            border: none;
        }

        .course-table tbody td.col-sl {
            text-align: center;
            color: var(--clr-text-muted);
            font-weight: 500;
            font-size: 13.5px;
        }

        .course-table tbody td.col-title {
            text-align: left;
            font-weight: 500;
            color: var(--clr-text);
            line-height: 1.45;
        }

        .course-table tbody td.col-hrci-type {
            text-align: center;
            font-weight: 500;
            color: var(--clr-text-muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .course-table tbody td.col-hrci {
            text-align: center;
            font-weight: 600;
            color: var(--gold);
            font-size: 14px;
        }

        /* ============================================
   ROW FADE-IN ANIMATION
   ============================================ */
        @keyframes rowFadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .course-table tbody tr.row-animate {
            animation: rowFadeIn 0.35s var(--ease-smooth) forwards;
            opacity: 0;
        }

        /* ============================================
   EMPTY STATE
   ============================================ */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .empty-text {
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* ============================================
   RESPONSIVE: TABLET
   ============================================ */
        @media (max-width: 991.98px) {
            .course-listing-page {
                padding: 32px 0 48px;
            }

            .filter-card {
                padding: 24px 24px 20px;
            }

            .course-table thead th,
            .course-table tbody td {
                padding: 14px 16px;
            }
        }

        /* ============================================
   RESPONSIVE: MOBILE
   ============================================ */
        @media (max-width: 575.98px) {
            .course-listing-page {
                padding: 20px 0 36px;
            }

            .filter-card {
                padding: 20px 18px 18px;
                border-radius: var(--radius-lg);
            }

            .filter-label-wrap {
                margin-bottom: 12px;
            }

            .filter-label {
                font-size: 12px;
            }

            .custom-select.form-select {
                height: 56px;
                font-size: 14px;
                padding-left: 16px;
                padding-right: 42px;
            }

            .select-arrow {
                right: 14px;
                font-size: 14px;
            }

            .course-count {
                margin-top: 12px;
                font-size: 13px;
            }

            .table-card {
                border-radius: var(--radius-lg);
            }

            .course-table {
                min-width: 600px;
            }

            .course-table thead th,
            .course-table tbody td {
                padding: 13px 14px;
                font-size: 13px;
            }

            .course-table thead th {
                font-size: 10.5px;
                letter-spacing: 1px;
            }

            .col-sl {
                width: 65px;
            }

            .col-hrci-type {
                width: 120px;
            }

            .col-hrci {
                width: 75px;
            }
        }
    </style>
</head>

<body>

    <main class="course-listing-page">
        <div class="container">

            <!-- Filter Card -->
            <section class="filter-card" aria-label="Course filter">
                <div class="d-flex align-items-center gap-2 filter-label-wrap">
                    <i class="bi bi-funnel filter-icon"></i>
                    <span class="filter-label">Course Type</span>
                </div>

                <div class="select-wrapper">
                    <select id="courseFilter" class="form-select custom-select" aria-label="Filter by course type">
                        <option value="all">All Courses</option>
                        <option value="certified" selected>Certified Professional</option>
                        <option value="diploma">Diploma/ Post Graduate Diploma</option>
                        <option value="Professional">Professional Certificate/ Certificate/ Post Graduate Certificate
                        </option>
                        <option value="Workshop">Workshop</option>
                    </select>
                    <i class="bi bi-chevron-down select-arrow" aria-hidden="true"></i>
                </div>

                <p class="course-count">
                    Showing <span id="courseCount" class="count-number">20</span> courses
                </p>
            </section>

            <!-- Table Card -->
            <section class="table-card" aria-label="Course list">
                <div class="table-responsive">
                    <table class="course-table" id="courseTable">
                        <thead>
                            <tr>
                                <th class="col-sl">SL NO</th>
                                <th class="col-title">COURSE TITLE</th>
                                <th class="col-hrci-type">HRCI TYPE</th>
                                <th class="col-hrci">HRCI</th>
                            </tr>
                        </thead>
                        <tbody id="courseTableBody">
                            <!-- Rows populated by JavaScript -->
                        </tbody>
                    </table>

                    <!-- Empty state -->
                    <div id="emptyState" class="empty-state is-hidden">
                        <i class="bi bi-inbox empty-icon"></i>
                        <p class="empty-text">No courses found</p>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Script -->
    <script>
        /* ============================================
   COURSE DATA
   ============================================ */
        const courses = [
            // Certified Professional
            { title: "Certified Competency Mapping Specialist [CCMS]", hrci: 16, hrciType: "HR (General)", category: "certified" },
            { title: "Certified HR Analytics Professional", hrci: 20, hrciType: "Business", category: "certified" },
            { title: "Certified Learning & Development Professional [CLDP]", hrci: 16, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Associate Human Resource Professional [CAHRP]", hrci: 20, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Team Performance Specialist [CTPS]", hrci: 14, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Succession Planning Specialist [CSPS]", hrci: 9, hrciType: "HR (General)", category: "certified" },
            { title: "Certified PEOPLE Champion", hrci: 16, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Apparel Compliance Professional [CACP]", hrci: 16, hrciType: "HR (General)", category: "certified" },
            { title: "Certified HR Business Partner 2.0 [Online]", hrci: 45, hrciType: "Business", category: "certified" },
            { title: "Certified HR Business Partner 2.0 [Virtual Class based]", hrci: 15, hrciType: "Business", category: "certified" },
            { title: "Certified Compensation & Benefits Professional [CCBP]", hrci: 16, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Human Resource Professional [CHRP]", hrci: 24, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Key Performance Indicator Specialist [CKPIS]", hrci: 24, hrciType: "Business", category: "certified" },
            { title: "Certified HR Generalist [CHRG]", hrci: 24, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Recruitment & Selection Specialist [CRSS]", hrci: 16, hrciType: "Talent", category: "certified" },
            { title: "Certified Performance Management Professional [CPMP]", hrci: 22, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Organization Development Professional [CODP]", hrci: 16, hrciType: "Business", category: "certified" },
            { title: "Certified Human Resource Associate", hrci: 15.75, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Psychometric Assessment Specialist [CPAS]", hrci: 16, hrciType: "HR (General)", category: "certified" },
            { title: "Certified Fellow Human Resource Professional [cFHRP]", hrci: 15, hrciType: "HR (General)", category: "certified" },
            { title: "Certified HR Compliance Professional [CHRCP]", hrci: 20, hrciType: "HR (General)", category: "certified" },


            // Diploma Program
            { title: "Post Graduate Diploma in Human Resource Management", hrci: 72, hrciType: "HR (General)", category: "diploma" },
            { title: "Post Graduate Diploma in Leadership & People Management [PGDLPM]", hrci: 50, hrciType: "HR (General)", category: "diploma" },
            { title: "Post Graduate Diploma in Business Communication & Managerial Competency [PGDBCMC]", hrci: 50, hrciType: "HR (General)", category: "diploma" },
            { title: "Post Graduate Diploma in Occupational Safety & Health (PGDOSH)", hrci: 50, hrciType: "HR (General)", category: "diploma" },
            { title: "Post Graduate Diploma in Business Management [PGDBM]", hrci: 72, hrciType: "Business", category: "diploma" },
            { title: "Diploma in Human Resource Management [DHRM]", hrci: 48, hrciType: "HR (General)", category: "diploma" },

            // Professional Course
            { title: "Professional Certificate in Managerial Excellence [PcMEx]", hrci: 20, hrciType: "HR (General)", category: "Professional" },
            { title: "Professional Certificate in Strategic HR Management [PcSHRM]", hrci: 20, hrciType: "HR (General)", category: "Professional" },
            { title: "Professional Certificate in Leadership Excellence [PcLE]", hrci: 12, hrciType: "HR (General)", category: "Professional" },
            { title: "Professional Certificate in HR Operations [PcHRO]", hrci: 20, hrciType: "HR (General)", category: "Professional" },
            { title: "Professional Certificate in Compensation & Benefit Management [PcCBM]", hrci: 16, hrciType: "HR (General)", category: "Professional" },
            { title: "Professional Certificate in Health, Safety & Environment [PcHSE]", hrci: 16, hrciType: "HR (General)", category: "Professional" },
            { title: "Professional Certificate in Training Need & Impact Assessment [PcTNAIA]", hrci: 16, hrciType: "HR (General)", category: "Professional" },
            { title: "Talent Management Master Class [TMMC]", hrci: 20, hrciType: "HR (General)", category: "Professional" },

            // Workshop Course
            { title: "HR Audit: Preparation & Conduction", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "TNA: Process, Tools and Technique", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "ROI of Training", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Coaching Skills for Managers", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Competency Mapping: Tools & Techniques", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Facilitation: Concept & Competencies", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "HR Planning: Scientific and Mathematical Calculation", hrci: 4, hrciType: "HR (General)", category: "Workshop" },
            { title: "Methods for KPI Designing", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Methods of Recruitment & Selection", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Job Analysis: Methods & Tools", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Employee Turnover Cost: Calculation & Reduction", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Learning & Development Essentials", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Learning & Development as Business Partner", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Employee Separation & Final Settlement: Process & Calculation", hrci: 3, hrciType: "HR (General)", category: "Workshop" },
            { title: "Emotional Intelligence at Work: KEY to Success", hrci: 4, hrciType: "HR (General)", category: "Workshop" },
        ];

        /* ============================================
           DOM REFERENCES
           ============================================ */
        const filterSelect = document.getElementById('courseFilter');
        const tableBody = document.getElementById('courseTableBody');
        const courseCountEl = document.getElementById('courseCount');
        const emptyState = document.getElementById('emptyState');
        const courseTable = document.getElementById('courseTable');

        /* ============================================
           RENDER TABLE ROWS
           ============================================ */
        function renderCourses(filterValue) {
            const filtered = filterValue === 'all'
                ? courses
                : courses.filter(c => c.category === filterValue);

            tableBody.innerHTML = '';
            courseCountEl.textContent = filtered.length;

            if (filtered.length === 0) {
                courseTable.classList.add('is-hidden');
                emptyState.classList.remove('is-hidden');
                return;
            }

            courseTable.classList.remove('is-hidden');
            emptyState.classList.add('is-hidden');

            filtered.forEach((course, index) => {
                const tr = document.createElement('tr');
                tr.classList.add('row-animate');
                tr.style.animationDelay = `${index * 30}ms`;

                tr.innerHTML = `
            <td class="col-sl">${index + 1}</td>
            <td class="col-title">${course.title}</td>
            <td class="col-hrci-type">${course.hrciType}</td>
            <td class="col-hrci">${course.hrci}</td>
        `;

                tableBody.appendChild(tr);
            });
        }

        /* ============================================
           EVENT LISTENER
           ============================================ */
        filterSelect.addEventListener('change', function () {
            renderCourses(this.value);
        });

        /* ============================================
           INITIAL RENDER
           ============================================ */
        renderCourses(filterSelect.value);
    </script>
</body>

</html>
